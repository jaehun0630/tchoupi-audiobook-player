<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추피 오디오북</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background-color: #fef7ef;
      padding: 2rem;
      color: #333;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #2c3e50;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .inline-input-group {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .inline-input-group input[type="number"] {
      padding: 0.6rem;
      font-size: 1rem;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .inline-input-group button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      background-color: #ff9a57;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .inline-input-group button:hover {
      background-color: #f27528;
    }

    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2980b9;
    }

    #qr-reader {
      width: 300px;
      margin: 1rem auto;
    }

    #status-message {
      min-height: 1.5rem;
      margin: 0.5rem auto 1rem;
      color: #555;
      font-size: 0.95rem;
      line-height: 1.4;
      max-width: 420px;
    }

    #cover-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
    }

    #cover-image {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      display: none;
    }

    audio {
      margin-top: 1rem;
      width: 90%;
      max-width: 400px;
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 1rem;
      }

      h2 {
        font-size: 1.4rem;
      }

      .inline-input-group {
        flex-direction: column;
        align-items: center;
      }

      .inline-input-group input,
      .inline-input-group button {
        width: 100%;
        max-width: 240px;
      }

      #cover-image,
      #qr-reader {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <h2>📚 추피 오디오북 플레이어</h2>

  <div class="control-panel">
    <div class="inline-input-group">
      <input type="number" id="book-number-input" placeholder="책 번호 입력 (예: 6)" />
      <button id="play-button" type="button">재생</button>
    </div>
    <button id="scan-button" type="button">📷 QR 코드 인식</button>
  </div>

  <div id="status-message" aria-live="polite"></div>
  <div id="qr-reader" style="display: none;"></div>

  <div id="cover-wrapper">
    <img id="cover-image" src="" alt="책 표지" />
    <audio id="audio-player" controls autoplay></audio>
  </div>

  <script src="/app.js"></script>
</body>

</html>
